name: Deploy ourim.kr

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ourim-gw repo
        env:
          OURIM_PAT: ${{ secrets.OURIM_GITHUB_PAT }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add ourim https://github.com/nayureshy-lgtm/ourim-gw.git
          git config http.https://github.com/.extraheader "Authorization: Basic $(echo -n "x-access-token:${OURIM_PAT}" | base64 -w 0)"
          git push ourim HEAD:master --force

      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_GKw4dF7QhdaxyZ5gOdnvziGQqSvX/TeYMOkC6s2"
